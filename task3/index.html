<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevHub | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="side-nav">
            <div class="logo">Dev<b>Hub</b></div>
            <nav>
                <a href="#quiz-box" class="nav-item active">🎯 Skill Quiz</a>
                <br><br>
                <a href="#advice-box" class="nav-item">💡 Daily Advice</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Progress Dashboard</h1>
                <p>Welcome! Continue your journey with today's tasks.</p>
            </header>

            <section id="quiz-box" class="glass-card">
                <div class="card-header">
                    <h2>Advanced Logic Quiz</h2>
                    <div class="progress-container">
                        <div id="status-bar"></div>
                    </div>
                </div>

                <div id="quiz-ui">
                    <p id="q-count">Question 1 of 8</p>
                    <h3 id="question-text">Loading question...</h3>
                    <div id="options-list"></div>
                    <div class="quiz-controls">
                        <button id="next-btn" class="action-btn purple hide" onclick="nextQuestion()">Next Question</button>
                    </div>
                </div>

                <div id="results" class="hide">
                    <div class="trophy-icon">🏆</div>
                    <h3>Assessment Complete</h3>
                    <p id="score-display"></p>
                    <button class="action-btn" onclick="resetQuiz()">Restart Assessment</button>
                </div>
            </section>

            <section id="advice-box" class="glass-card">
                <h2>Daily Developer Advice</h2>
                <div class="advice-display">
                    <p id="advice-text">"Click the button to load some wisdom."</p>
                </div>
                <button class="action-btn purple" onclick="getDailyAdvice()" id="advice-btn">Fetch New Tip</button>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
